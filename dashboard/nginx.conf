resolver 127.0.0.11 valid=10s;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api/api/;
    }

    location /hls/ {
        set $upstream_rtmp http://nginx-rtmp:8080;
        proxy_pass $upstream_rtmp/hls/;
    }

    location /rtmp-stat {
        set $upstream_rtmp http://nginx-rtmp:8080;
        proxy_pass $upstream_rtmp/stat;
    }

    location /recordings/ {
        set $upstream_rtmp http://nginx-rtmp:8080;
        proxy_pass $upstream_rtmp/recordings/;
    }
}
