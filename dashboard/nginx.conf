resolver 127.0.0.11 valid=10s;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        client_max_body_size 20m;
    }

    location /hls/ {
        set $upstream_rtmp nginx-rtmp:8080;
        proxy_pass http://$upstream_rtmp;
    }

    location /rtmp-stat {
        set $upstream_rtmp nginx-rtmp:8080;
        rewrite ^/rtmp-stat(.*)$ /stat$1 break;
        proxy_pass http://$upstream_rtmp;
    }

    location /recordings/ {
        set $upstream_rtmp nginx-rtmp:8080;
        proxy_pass http://$upstream_rtmp;
    }
}
