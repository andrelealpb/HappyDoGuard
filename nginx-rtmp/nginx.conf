worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        notify_method get;

        application live {
            live on;
            record off;

            # Autenticação via callback na API
            on_publish http://api:8000/hooks/on-publish;
            on_publish_done http://api:8000/hooks/on-publish-done;

            # Gera HLS para visualização no dashboard
            hls on;
            hls_path /data/hls;
            hls_fragment 3;
            hls_playlist_length 30;
            hls_cleanup on;
        }

        application record {
            live on;
            record all;
            record_path /data/recordings;
            record_suffix -%Y%m%d-%H%M%S.flv;
            record_unique on;

            on_publish http://api:8000/hooks/on-publish;
            on_publish_done http://api:8000/hooks/on-publish-done;
            on_record_done http://api:8000/hooks/on-record-done;

            hls on;
            hls_path /data/hls;
            hls_fragment 3;
            hls_playlist_length 30;
            hls_cleanup on;
        }
    }
}

http {
    sendfile off;
    tcp_nopush on;
    directio 512;

    server {
        listen 8080;
        server_name _;

        # HLS streaming
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /data;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # RTMP stat
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /etc/nginx;
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
