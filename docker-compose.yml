services:
  nginx-rtmp:
    build: ./nginx-rtmp
    ports:
      - "1935:1935"   # RTMP ingest
      - "8080:8080"   # HLS playback + stats
    volumes:
      - hls_data:/data/hls
      - recordings:/data/recordings
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - HAPPYDO_DATABASE_URL=postgresql+asyncpg://happydo:happydo@db:5432/happydo_guard
      - HAPPYDO_REDIS_URL=redis://redis:6379/0
      - HAPPYDO_SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - HAPPYDO_DEBUG=${DEBUG:-false}
    volumes:
      - recordings:/data/recordings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
      - nginx-rtmp
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=happydo
      - POSTGRES_PASSWORD=happydo
      - POSTGRES_DB=happydo_guard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happydo -d happydo_guard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
  hls_data:
  recordings:
